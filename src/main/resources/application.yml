spring:
  application:
    name: service-orchestrator
  datasource:
    url: jdbc:h2:mem:sagadb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop

server:
  port: 8686

springdoc:
  swagger-ui:
    path: /swagger-ui.html
